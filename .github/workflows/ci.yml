name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  ts:
    name: TypeScript (gateway + web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r lint

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test

  docs:
    name: Docs (cross-link + freshness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check AGENTS.md targets exist
        run: |
          # Every relative link in AGENTS.md must resolve.
          # Real linter lands when the harness gardener does.
          grep -oE '\]\(\./[^)]+\)' AGENTS.md | sed -E 's|\]\(\./([^)]+)\)|\1|' | while read -r path; do
            if [ ! -e "$path" ]; then
              echo "::error file=AGENTS.md::broken link: $path"
              exit 1
            fi
          done

  docker-build:
    name: Docker build (gateway)
    runs-on: ubuntu-latest
    needs: [ts]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: gateway/Dockerfile
          push: false
          tags: openai-service-gateway:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-publish:
    name: Docker publish (gateway)
    runs-on: ubuntu-latest
    needs: [ts, docs, docker-build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract tag
        id: meta
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build + push (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: gateway/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            tztcloud/openai-service-gateway:${{ steps.meta.outputs.version }}
            tztcloud/openai-service-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
